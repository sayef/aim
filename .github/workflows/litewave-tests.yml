name: litewave-backend tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build deps + litewave + runtime deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements-ci.txt

      - name: Build aim (Cython, against pure-Python litewave)
        run: pip install -e . --no-build-isolation --no-deps

      - name: Smoke test (aim on litewave)
        run: python tests/smoke_litewave.py
